<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <meta name="description" content="Gukgu เครื่องมือแปลงหน่วยระยะ ใช้ง่าย รองรับไทยและอังกฤษ ทำงานออฟไลน์ได้" />
  <link rel="icon" href="gukgu-logo.svg?v=1.4.0" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css?v=1.4.0" />
  <title>gukgu — แปลงระยะ</title>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="./" aria-label="Gukgu home">
      <img src="gukgu-logo.svg?v=1.4.0" alt="" width="58" height="58" />
      <span>gukgu</span>
    </a>

    <div class="header-actions">
      <div class="language-switcher" role="group" aria-label="Language">
        <button class="lang-button is-active" type="button" data-lang="th" aria-pressed="true">ไทย</button>
        <button class="lang-button" type="button" data-lang="en" aria-pressed="false">EN</button>
      </div>
    </div>
  </header>

  <main class="page-shell">

    <section class="converter-card" aria-labelledby="converterTitle">
      <h1 id="converterTitle" data-i18n="title">แปลงระยะ</h1>

      <div class="field">
        <label for="category" data-i18n="category">ประเภทหน่วย</label>
        <select id="category"></select>
      </div>

      <div class="field">
        <label for="amount" data-i18n="amount">จำนวน</label>
        <input id="amount" type="number" inputmode="decimal" value="8" step="any" autocomplete="off" />
      </div>

      <div class="unit-row">
        <div class="field unit-field">
          <label for="fromUnit" data-i18n="from">จาก</label>
          <select id="fromUnit"></select>
        </div>

        <button id="swapButton" class="swap-button" type="button" aria-label="สลับหน่วย" data-i18n-aria="swap">
          <span aria-hidden="true">⇄</span>
        </button>

        <div class="field unit-field">
          <label for="toUnit" data-i18n="to">เป็น</label>
          <select id="toUnit"></select>
        </div>
      </div>

      <section class="result-card" aria-live="polite" aria-atomic="true">
        <span class="result-label" data-i18n="result">ผล</span>
        <strong id="resultValue">20.32</strong>
        <span id="resultUnit">ซม.</span>
      </section>

      <p id="formulaText" class="formula-text"></p>

      <section id="smartResult" class="smart-result" hidden>
        <div class="smart-result-heading">
          <span data-i18n="easyRead">อ่านง่าย</span>
          <button id="explainButton" class="info-button" type="button" aria-expanded="false" aria-controls="explanationPanel" data-i18n-aria="showMethod">ⓘ</button>
        </div>
        <strong id="easyResult" class="easy-result"></strong>
        <div id="explanationPanel" class="explanation-panel" hidden>
          <span class="explanation-title" data-i18n="method">วิธีคิด</span>
          <p id="explanationText"></p>
        </div>
      </section>
    </section>

    <p class="footer-note" data-i18n="footer">คำนวณบนอุปกรณ์ของคุณ ไม่มีการส่งข้อมูลออกจากเครื่อง</p>
    <p class="version-note">gukgu v1.4.0</p>
  </main>

  <script src="app.js?v=1.4.0" defer></script>
</body>
</html>
